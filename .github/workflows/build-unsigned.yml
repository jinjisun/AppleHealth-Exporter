name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project AppleHealthExporter.xcodeproj

      - name: Build unsigned app
        shell: bash
        run: |
          set -eo pipefail
          xcodebuild \
            -project AppleHealthExporter.xcodeproj \
            -scheme AppleHealthExporter \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            PROVISIONING_PROFILE= \
            build 2>&1 | tee xcodebuild.log
          exit "${PIPESTATUS[0]}"

      - name: Print build errors on failure
        if: failure()
        shell: bash
        run: |
          echo "=== error: lines ==="
          grep -E "error:|fatal error:" xcodebuild.log || true
          echo "=== signing: lines ==="
          grep -iE "codesign|entitlement|provision" xcodebuild.log || true
          echo "=== log tail ==="
          tail -n 120 xcodebuild.log || true

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_NAME="AppleHealthExporter"
          APP_PATH=$(find build/DerivedData -name "${APP_NAME}.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find ${APP_NAME}.app"
            find build -type d -name "*.app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # 终极暴力破解：无视外部文件，直接在打包前强制写入 HealthKit 权限！
          ENT_DST="${APP_PATH}/archived-expanded-entitlements.xcent"
          cat << 'EOF' > "$ENT_DST"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.healthkit</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "Forced HealthKit entitlements into app bundle"

          mkdir -p dist/Payload
          cp -R "$APP_PATH" "dist/Payload/${APP_NAME}.app"
          cd dist
          zip -r "../${APP_NAME}.ipa" Payload
          cd ..
          ls -la "${APP_NAME}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppleHealthExporter-unsigned-ipa
          path: AppleHealthExporter.ipa
          if-no-files-found: error

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: warn
