name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project AppleHealthExporter.xcodeproj

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project AppleHealthExporter.xcodeproj \
            -scheme AppleHealthExporter \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ENTITLEMENTS=AppleHealthExporter/AppleHealthExporter-CI.entitlements \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            PROVISIONING_PROFILE= \
            build 2>&1 | tee xcodebuild.log

      - name: Print build errors on failure
        if: failure()
        run: |
          echo "=== error: lines ==="
          grep -E "error:|fatal error:" xcodebuild.log || true
          echo "=== signing: lines ==="
          grep -iE "codesign|entitlement|provision" xcodebuild.log || true

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_NAME="AppleHealthExporter"
          APP_PATH=$(find build/DerivedData -name "${APP_NAME}.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find ${APP_NAME}.app"
            find build -type d -name "*.app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # 将 HealthKit entitlement 写入未签名包，供 Sideloadly 重签名时使用
          ENT_SRC="AppleHealthExporter/AppleHealthExporter.entitlements"
          ENT_DST="${APP_PATH}/archived-expanded-entitlements.xcent"
          if [ -f "$ENT_SRC" ]; then
            cp "$ENT_SRC" "$ENT_DST" || plutil -convert xml1 "$ENT_SRC" -o "$ENT_DST"
            echo "Copied entitlements into app bundle"
          fi

          mkdir -p dist/Payload
          cp -R "$APP_PATH" "dist/Payload/${APP_NAME}.app"
          cd dist
          zip -r "../${APP_NAME}.ipa" Payload
          cd ..
          ls -la "${APP_NAME}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppleHealthExporter-unsigned-ipa
          path: AppleHealthExporter.ipa
          if-no-files-found: error

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: warn
